name: ci
on:
  pull_request:
    paths:
      - "charts/xscaler-agent/**"
      - ".github/workflows/**"

permissions:
  contents: read

jobs:
  chart:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.15.4

      - name: Lint
        run: helm lint charts/xscaler-agent --set enrollmentToken=xse_ci

      - name: Template (default)
        run: helm template ci charts/xscaler-agent --set enrollmentToken=xse_ci >/dev/null

      - name: Template (ebpf + traces)
        run: |
          helm template ci charts/xscaler-agent \
            --set enrollmentToken=xse_ci \
            --set nodeAgent.ebpf.enabled=true \
            --set nodeAgent.traces.enabled=true >/dev/null

  actions:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lint workflows
        # actionlint validates workflow syntax + ${{ }} expressions and runs
        # shellcheck over `run:` scripts. Catches release.yml bugs before they
        # reach main (the release path). Pin the image tag to bump on purpose.
        run: docker run --rm -v "${PWD}:/repo" -w /repo rhysd/actionlint:1.7.12 -color
