name: release
on:
  push:
    tags:
      - "v*"
  release:
    types: [published]

env:
  IMAGE: ghcr.io/xscaler/xscaler-agent

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - flavour: default
            target: default
            platform: linux/amd64
            runner: ubuntu-24.04
          - flavour: default
            target: default
            platform: linux/arm64
            runner: ubuntu-24.04-arm
          - flavour: ebpf
            target: ebpf
            platform: linux/amd64
            runner: ubuntu-24.04
          - flavour: ebpf
            target: ebpf
            platform: linux/arm64
            runner: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare platform pair
        id: prep
        # linux/amd64 -> linux-amd64 (for a valid artifact name)
        run: echo "pair=${platform//\//-}" >> "$GITHUB_OUTPUT"
        env:
          platform: ${{ matrix.platform }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          target: ${{ matrix.target }}
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=${{ env.IMAGE }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ matrix.flavour }}-${{ matrix.platform }}
          cache-to: type=gha,mode=max,scope=${{ matrix.flavour }}-${{ matrix.platform }}

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.flavour }}-${{ steps.prep.outputs.pair }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    runs-on: ubuntu-24.04
    needs: build
    strategy:
      matrix:
        flavour: [default, ebpf]
    steps:
      - name: Derive version
        id: version
        # Strip the leading `v` from the tag: v0.151.0 -> 0.151.0
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-${{ matrix.flavour }}-*
          merge-multiple: true

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: tags
        # default flavour -> :<version> + :latest ; ebpf flavour -> :<version>-ebpf
        run: |
          if [ "${{ matrix.flavour }}" = "default" ]; then
            echo "args=-t ${IMAGE}:${{ steps.version.outputs.version }} -t ${IMAGE}:latest" >> "$GITHUB_OUTPUT"
            echo "ref=${IMAGE}:${{ steps.version.outputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "args=-t ${IMAGE}:${{ steps.version.outputs.version }}-ebpf" >> "$GITHUB_OUTPUT"
            echo "ref=${IMAGE}:${{ steps.version.outputs.version }}-ebpf" >> "$GITHUB_OUTPUT"
          fi

      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create ${{ steps.tags.outputs.args }} \
            $(printf "${IMAGE}@sha256:%s " *)

      - name: Inspect
        run: docker buildx imagetools inspect ${{ steps.tags.outputs.ref }}
