{{- if not .Values.existingSecret.name }}
{{- if not .Values.enrollmentToken }}
{{- fail "Set enrollmentToken (xse_...) or existingSecret.name" }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "xscaler-agent.secretName" . }}
  labels:
    {{- include "xscaler-agent.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{ .Values.existingSecret.key }}: {{ .Values.enrollmentToken | quote }}
{{- end }}
