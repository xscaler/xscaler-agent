name: release
on:
  # Runs on every push to main, but the `version` job only cuts a release when
  # Chart.yaml's version names a tag that doesn't exist yet — otherwise it
  # no-ops. (A paths filter on Chart.yaml can't be used here: it would never
  # fire on the commit that first introduces this workflow, since that commit
  # doesn't touch Chart.yaml.)
  push:
    branches: [main]
  workflow_dispatch: {}

env:
  IMAGE: ghcr.io/xscaler/xscaler-agent
  CHART_DIR: charts/xscaler-agent
  CHART_REGISTRY: oci://ghcr.io/xscaler/charts

permissions:
  contents: write # create & push the release tag
  packages: write

jobs:
  version:
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.v.outputs.version }}
      release: ${{ steps.v.outputs.release }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version and tag
        id: v
        # The xScaler distro version is Chart.yaml's `version` — the single
        # number a human bumps in a PR. It is NOT the bundled OpenTelemetry
        # collector version (that's OTEL_VERSION in the Dockerfile, surfaced as
        # the image's org.opentelemetry.collector.version label). On each push
        # we tag v<version> if it doesn't exist yet; that tag drives the image
        # tag, chart version and appVersion, keeping all three in lockstep.
        run: |
          version=$(grep -E '^version:' "${CHART_DIR}/Chart.yaml" | awk '{print $2}')
          tag="v${version}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          if git ls-remote --exit-code --tags origin "refs/tags/${tag}" >/dev/null 2>&1; then
            echo "tag ${tag} already exists — nothing to release"
            echo "release=false" >> "$GITHUB_OUTPUT"
          else
            git tag "${tag}"
            git push origin "${tag}"
            echo "release=true" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: version
    if: needs.version.outputs.release == 'true'
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - flavour: default
            target: default
            platform: linux/amd64
            runner: ubuntu-24.04
          - flavour: default
            target: default
            platform: linux/arm64
            runner: ubuntu-24.04-arm
          - flavour: ebpf
            target: ebpf
            platform: linux/amd64
            runner: ubuntu-24.04
          - flavour: ebpf
            target: ebpf
            platform: linux/arm64
            runner: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare platform pair
        id: prep
        # linux/amd64 -> linux-amd64 (for a valid artifact name)
        run: echo "pair=${platform//\//-}" >> "$GITHUB_OUTPUT"
        env:
          platform: ${{ matrix.platform }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          target: ${{ matrix.target }}
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=${{ env.IMAGE }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ matrix.flavour }}-${{ matrix.platform }}
          cache-to: type=gha,mode=max,scope=${{ matrix.flavour }}-${{ matrix.platform }}

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.flavour }}-${{ steps.prep.outputs.pair }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    runs-on: ubuntu-24.04
    needs: [version, build]
    strategy:
      matrix:
        flavour: [default, ebpf]
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-${{ matrix.flavour }}-*
          merge-multiple: true

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: tags
        # default flavour -> :<version> + :latest ; ebpf flavour -> :<version>-ebpf
        env:
          version: ${{ needs.version.outputs.version }}
        run: |
          if [ "${{ matrix.flavour }}" = "default" ]; then
            echo "args=-t ${IMAGE}:${version} -t ${IMAGE}:latest" >> "$GITHUB_OUTPUT"
            echo "ref=${IMAGE}:${version}" >> "$GITHUB_OUTPUT"
          else
            echo "args=-t ${IMAGE}:${version}-ebpf" >> "$GITHUB_OUTPUT"
            echo "ref=${IMAGE}:${version}-ebpf" >> "$GITHUB_OUTPUT"
          fi

      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          # Word-splitting is intentional: each digest becomes a separate arg.
          # shellcheck disable=SC2046
          docker buildx imagetools create ${{ steps.tags.outputs.args }} \
            $(printf "${IMAGE}@sha256:%s " *)

      - name: Inspect
        run: docker buildx imagetools inspect ${{ steps.tags.outputs.ref }}

  chart:
    runs-on: ubuntu-24.04
    # Publish the chart only after the images it references exist in GHCR.
    needs: [version, merge]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.15.4

      - name: Log in to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | \
            helm registry login ghcr.io --username "${{ github.actor }}" --password-stdin

      - name: Package and push
        # The distro version drives both the chart version and the appVersion
        # (which the chart uses as the image tag).
        env:
          version: ${{ needs.version.outputs.version }}
        run: |
          helm package "${CHART_DIR}" \
            --version "${version}" \
            --app-version "${version}" \
            --destination dist
          helm push "dist/xscaler-agent-${version}.tgz" "${CHART_REGISTRY}"
