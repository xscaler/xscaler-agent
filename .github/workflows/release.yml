name: release

# Publish multi-arch images to ghcr.io on a version tag (e.g. v0.151.0).
on:
  push:
    tags:
      - "v*"
  release:
    types: [published]

env:
  IMAGE: ghcr.io/xscaler/xscaler-agent

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Derive version
        id: version
        # Strip the leading `v` from the tag: v0.151.0 -> 0.151.0
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      # arm64 is built under QEMU emulation (runners are amd64).
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # default flavour -> :<version> + :latest
      - name: Build and push (default)
        uses: docker/build-push-action@v6
        with:
          context: .
          target: default
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ steps.version.outputs.version }}
            ${{ env.IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # eBPF flavour -> :<version>-ebpf
      - name: Build and push (ebpf)
        uses: docker/build-push-action@v6
        with:
          context: .
          target: ebpf
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ steps.version.outputs.version }}-ebpf
          cache-from: type=gha
          cache-to: type=gha,mode=max
