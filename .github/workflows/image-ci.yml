name: image-ci
on:
  pull_request:
    paths:
      - "Dockerfile"
      - ".github/workflows/image-ci.yml"

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build default image (amd64, no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          target: default
          platforms: linux/amd64
          push: false
          # Warm from the release build's cache; write to a separate CI scope so
          # PRs never clobber the cache the release relies on.
          cache-from: type=gha,scope=default-linux/amd64
          cache-to: type=gha,mode=max,scope=ci-default-linux/amd64
