name: chart-release
on:
  push:
    branches: [main]
    paths:
      - "charts/xscaler-agent/**"
      - ".github/workflows/chart-release.yml"

env:
  CHART_DIR: charts/xscaler-agent
  REGISTRY: oci://ghcr.io/xscaler/charts

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.15.4

      - name: Read chart version
        id: chart
        run: |
          version=$(grep -E '^version:' "${CHART_DIR}/Chart.yaml" | awk '{print $2}')
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | \
            helm registry login ghcr.io --username "${{ github.actor }}" --password-stdin

      - name: Skip if version already published
        id: exists
        run: |
          if helm show chart "${REGISTRY}/xscaler-agent" \
               --version "${{ steps.chart.outputs.version }}" >/dev/null 2>&1; then
            echo "chart ${{ steps.chart.outputs.version }} already published — skipping"
            echo "published=true" >> "$GITHUB_OUTPUT"
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Package and push
        if: steps.exists.outputs.published == 'false'
        run: |
          helm package "${CHART_DIR}" --destination dist
          helm push "dist/xscaler-agent-${{ steps.chart.outputs.version }}.tgz" "${REGISTRY}"
